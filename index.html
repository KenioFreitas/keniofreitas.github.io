  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

rticle>\n        <\u002Fsc-for>\n      <\u002Fsection>\n\n      <!-- Skills -->\n      <section id=\"competencias\" data-screen-label=\"Competências\" style=\"display: flex; flex-direction: column; gap: 18px; animation: fadeUp 0.7s ease-out 0.35s both;\">\n        <h2 style=\"margin: 0; font-family: 'JetBrains Mono', monospace; font-size: 14px; color: #45FF7A; letter-spacing: 0.14em; text-transform: uppercase; border-bottom: 1px solid #1E2B22; padding-bottom: 8px;\">// competências &amp; certificações<\u002Fh2>\n        <div class=\"kf-skills-grid\" style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 12px 28px;\">\n          <sc-for list=\"{{ skills }}\" as=\"sk\" hint-placeholder-count=\"7\">\n            <div style=\"display: flex; flex-direction: column; gap: 5px;\">\n              <div style=\"display: flex; justify-content: space-between; align-items: baseline;\">\n                <span style=\"font-size: 13px; color: #C7D8CB;\">{{ sk.name }}<\u002Fspan>\n                <span style=\"font-family: 'JetBrains Mono', monospace; font-size: 11px; color: #5E7566;\">{{ sk.pct }}%<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"height: 6px; background: #16211A; border-radius: 3px; overflow: hidden;\">\n                <div style=\"height: 100%; width: {{ sk.pct }}%; background: linear-gradient(90deg, #1E8F4A, #45FF7A); border-radius: 3px; box-shadow: 0 0 10px rgba(69,255,122,0.5); animation: growBar 1.4s ease-out 0.5s both;\"><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"display: flex; flex-wrap: wrap; gap: 8px; margin-top: 4px;\">\n          <sc-for list=\"{{ certs }}\" as=\"c\" hint-placeholder-count=\"3\">\n            <span style=\"font-family: 'JetBrains Mono', monospace; font-size: 11px; color: #A9E8BC; background: #102016; border: 1px solid #1E3B28; border-radius: 4px; padding: 6px 12px; transition: all 0.25s ease;\" style-hover=\"border-color: #45FF7A; box-shadow: 0 0 14px rgba(69,255,122,0.35);\">{{ c }}<\u002Fspan>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <!-- Education -->\n      <section id=\"formacao\" data-screen-label=\"Formação\" style=\"display: flex; flex-direction: column; gap: 18px; animation: fadeUp 0.7s ease-out 0.4s both;\">\n        <h2 style=\"margin: 0; font-family: 'JetBrains Mono', monospace; font-size: 14px; color: #45FF7A; letter-spacing: 0.14em; text-transform: uppercase; border-bottom: 1px solid #1E2B22; padding-bottom: 8px;\">// formação &amp; idiomas<\u002Fh2>\n        <div class=\"kf-edu-grid\" style=\"display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px;\">\n          <sc-for list=\"{{ education }}\" as=\"ed\" hint-placeholder-count=\"4\">\n            <div style=\"background: #0D1410; border: 1px solid #1E2B22; border-radius: 8px; padding: 14px 16px 14px 18px; display: flex; align-items: center; justify-content: space-between; gap: 12px; overflow: hidden; transition: all 0.3s ease;\" style-hover=\"border-color: #45FF7A; box-shadow: 0 0 18px rgba(69,255,122,0.2);\">\n              <div style=\"display: flex; flex-direction: column; gap: 3px; min-width: 0;\">\n                <span style=\"font-size: 13.5px; font-weight: 600;\">{{ ed.title }}<\u002Fspan>\n                <span style=\"font-family: 'JetBrains Mono', monospace; font-size: 11px; color: #93A99A;\">{{ ed.org }} · {{ ed.year }}<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"width: 56px; height: 56px; border-radius: 8px; background: #1E3B28; display: flex; align-items: center; justify-content: center; flex-shrink: 0; overflow: hidden; padding: 6px; box-sizing: border-box;\">\n                {{ ed.logoImg }}\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"font-size: 13px; color: #93A99A;\">Idiomas: <span style=\"color: #C7D8CB;\">Português — Nativo<\u002Fspan> · <span style=\"color: \n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = {\n    active: 'perfil',\n    mobileMenuOpen: false,\n    expanded: { dasa: false, c6: false, itau: false, oi: false }\n  };\n\n  componentDidMount() {\n    const counters = document.querySelectorAll('[data-counter]');\n    counters.forEach((el) => {\n      const raw = el.getAttribute('data-counter');\n      if (raw === 'null' || raw === '' || raw === null) return;\n      const target = parseFloat(raw);\n      if (isNaN(target)) return;\n      const prefix = el.getAttribute('data-prefix') || '';\n      const suffix = el.getAttribute('data-suffix') || '';\n      const decimals = parseInt(el.getAttribute('data-decimals') || '0', 10);\n      const dur = 1600;\n      const t0 = performance.now();\n      const tick = (t) => {\n        const p = Math.min((t - t0) / dur, 1);\n        const eased = 1 - Math.pow(1 - p, 3);\n        el.textContent = prefix + (target * eased).toFixed(decimals).replace('.', ',') + suffix;\n        if (p < 1) requestAnimationFrame(tick);\n      };\n      requestAnimationFrame(tick);\n    });\n\n    const ids = ['perfil', 'numeros', 'timeline', 'experiencia', 'competencias', 'formacao', 'contato'];\n    this._observer = new IntersectionObserver((entries) => {\n      entries.forEach((e) => {\n        if (e.isIntersecting) this.setState({ active: e.target.id });\n      });\n    }, { rootMargin: '-40% 0px -55% 0px' });\n    ids.forEach((id) => {\n      const el = document.getElementById(id);\n      if (el) this._observer.observe(el);\n    });\n  }\n\n  componentWillUnmount() {\n    if (this._observer) this._observer.disconnect();\n  }\n\n  toggleJob(key) {\n    this.setState((s) => ({ expanded: { ...s.expanded, [key]: !s.expanded[key] } }));\n  }\n\n  renderVals() {\n    const active = this.state.active;\n    const exp = this.state.expanded;\n    const jobLogo = (src, alt) => React.createElement('img', {\n      src, alt,\n      style: { width: 44, height: 44, borderRadius: 9, objectFit: 'contain', background: '#1E2B22', border: '1px solid #1E2B22', padding: 4, boxSizing: 'border-box', flexShrink: 0 }\n    });\n    const edLogo = (src, alt) => React.createElement('img', {\n      src, alt,\n      style: { width: '100%', height: '100%', objectFit: 'contain' }\n    });\n    const nav = [\n      { href: '#perfil', id: 'perfil', label: '01 · perfil' },\n      { href: '#numeros', id: 'numeros', label: '02 · números' },\n      { href: '#timeline', id: 'timeline', label: '03 · timeline' },\n      { href: '#experiencia', id: 'experiencia', label: '04 · experiência' },\n      { href: '#competencias', id: 'competencias', label: '05 · competências' },\n      { href: '#formacao', id: 'formacao', label: '06 · formação' },\n      { href: '#contato', id: 'contato', label: '07 · contato' }\n    ].map((n) => ({\n      ...n,\n      color: n.id === active ? '#45FF7A' : '#93A99A',\n      border: n.id === active ? '#45FF7A' : 'transparent'\n    }));\n\n    return {\n      mobileMenuOpen: this.state.mobileMenuOpen,\n      mobileMenuLabel: this.state.mobileMenuOpen ? '✕ fechar' : '☰ menu',\n      toggleMobileMenu: () => this.setState((s) => ({ mobileMenuOpen: !s.mobileMenuOpen })),\n      closeMobileMenu: () => this.setState({ mobileMenuOpen: false }),\n      navItems: nav,\n      kpis: [\n        { target: 20, prefix: '', suffix: '+', decimals: 0, initial: '0+', label: 'anos de carreira' },\n        { target: 4, prefix: '', suffix: '', decimals: 0, initial: '0', label: 'setores: Telecom, Bancos, Saúde e Dados' },\n        { target: null, prefix: '', suffix: '', decimals: 0, initial: 'Python', label: 'diferencial analítico: automação e dados em escala' },\n        { target: 12, prefix: '', suffix: '', decimals: 0, initial: '0', label: 'projetos no portfólio keniofreitas.github.io' }\n      ],\n      skills: [\n        { name: 'Lean Six Sigma', pct: 95 },\n        { name: 'Power BI · Tableau', pct: 90 },\n        { name: 'Gestã s cadastrais de grandes volumes de CNPJs a partir de planilhas — reduzindo dependência de serviços pagos.',\n              tags: ['Python', 'ThreadPoolExecutor', 'API REST']\n            },\n            {\n              title: 'Agente de Vendas Bancárias com IA',\n              period: '2025',\n              desc: 'Agente conversacional autônomo via WhatsApp com lógica bancária integrada, conduzindo simulações de conta PJ e crédito e qualificando leads sem intervenção humana no fluxo principal.',\n              tags: ['LLM', 'WhatsApp API', 'IA Generativa']\n            }\n          ]\n        },\n        {\n          role: 'Gerente Comercial',\n          org: 'Itaú Unibanco · SP, RS e MG — 18 anos de casa',\n          period: '2006 — 2024',\n          logoImg: jobLogo((window.__resources && window.__resources.logoItau) || 'assets/logo-itau.png', 'Itaú Unibanco'),\n          subroles: 'Gerente Geral Agência Digital (2016–2024) · Gerente de Modelo Franquias (2012–2016) · Gerente Geral Agência Física (2006–2012)',\n          bullets: [\n            'Hackathons de dados: modelos de crédito PF, detecção de fraudes, chatbots e CRM (churn/CLV)',\n            'MIS via Tableau, BI e Excel para hierarquia; clusterização (ML) para mapear oportunidades regionais',\n            'Gestão comercial de agências digitais e físicas em três estados'\n          ],\n          expanded: exp.itau,\n          toggle: () => this.toggleJob('itau'),\n          toggleLabel: exp.itau ? '− ocultar projetos' : '+ ver 3 projetos do portfólio',\n          projects: [\n            {\n              title: 'Prospecção PJ com geomarketing',\n              period: '2007',\n              desc: 'Metodologia de geomarketing analógico (mapas físicos, ímãs, fichas por quarteirão) para priorizar visitas comerciais em bairro denso — crescimento expressivo na abertura de contas PJ.',\n              tags: ['Geomarketing', 'Planejamento territorial']\n            },\n            {\n              title: 'MIS Uniclass Digital: consolidação de indicadores',\n              period: '2016–2022',\n              desc: 'Automação via PowerQuery/OneDrive do envio manual de planilhas de mais de 200 agências, eliminando o ciclo manual e habilitando visão em tempo real do status de vendas.',\n              tags: ['PowerQuery', 'OneDrive', 'BI']\n            },\n            {\n              title: 'Triagem de candidatos com scoring',\n              period: '2020',\n              desc: 'Ferramenta de triagem automatizada (forms + score) para acelerar o funil de seleção digital durante a pandemia, com feedback de aderência ao candidato.',\n              tags: ['IA', 'NLP', 'Automação']\n            }\n          ]\n        },\n        {\n          role: 'Especialista Financeiro',\n          org: 'Oi / Telemar',\n          period: '2001 — 2006',\n          logoImg: jobLogo((window.__resources && window.__resources.logoOi) || 'assets/logo-oi-sm.png', 'Oi / Telemar'),\n          subroles: null,\n          bullets: [\n            'Planejamento comercial e orçamentário; modelos de remuneração com parceiros de Televendas',\n            'Six Sigma Green Belt: PDCA com Minitab para redução de variabilidade e eliminação de defeitos'\n          ],\n          expanded: exp.oi,\n          toggle: () => this.toggleJob('oi'),\n          toggleLabel: exp.oi ? '− ocultar projetos' : '+ ver 4 projetos do portfólio',\n          projects: [\n            {\n              title: 'PAM: Plano de Antecipação de Metas',\n              period: '2002–2003',\n              desc: 'Gerador de scripts de configuração em Excel para automatizar parametrização de centrais telefônicas de fabricantes distintos, antecipando metas regulatórias da Anatel.',\n              tags: ['Excel VBA', 'Automação de testes']\n            },\n            {\n              title: 'BOV: Base Operacional de Vendas',\n              period: '2003–2004',\n              desc: 'Evolução de planilhas via ODBC para o primeiro sistema integrado de vend
